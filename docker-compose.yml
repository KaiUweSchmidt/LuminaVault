services:
  nats:
    image: nats:2-alpine
    command: "--http_port 8222 -js"
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: luminavault
      POSTGRES_PASSWORD: luminavault
      POSTGRES_DB: luminavault-metadata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luminavault -d luminavault-metadata"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  gisgraphy-db:
    image: postgis/postgis:17-3.4-alpine
    environment:
      POSTGRES_USER: gisgraphy
      POSTGRES_PASSWORD: gisgraphy
      POSTGRES_DB: gisgraphy
    volumes:
      - gisgraphy-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gisgraphy -d gisgraphy"]
      interval: 5s
      timeout: 5s
      retries: 5

  gisgraphy:
    image: gisgraphy/gisgraphyofficial:latest
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://gisgraphy-db:5432/gisgraphy"
      SPRING_DATASOURCE_USERNAME: gisgraphy
      SPRING_DATASOURCE_PASSWORD: gisgraphy
    volumes:
      - gisgraphy-osm-data:/osm-data
    depends_on:
      gisgraphy-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/reversegeocoding/reversegeocode?lat=48&lng=11&format=json || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ──────────────────────────────────────────────────────────────────────────────
  # One-shot Europe OSM importer – only runs when the 'import' profile is active.
  #
  # Usage (run once after the stack is up):
  #   docker compose --profile import up --no-deps gisgraphy-importer
  #
  # What it does:
  #   1. Downloads the Europe OSM PBF extract from Geofabrik (~30 GB, may take
  #      a long time depending on your connection).
  #   2. Calls the Gisgraphy import API to kick off the data import into
  #      gisgraphy-db.  The import itself can take several hours.
  #
  # Note: Sufficient disk space (≥100 GB) and RAM (≥8 GB) are recommended for
  # a full Europe import.  For testing, replace the Geofabrik URL with a smaller
  # regional extract, e.g.:
  #   https://download.geofabrik.de/europe/germany-latest.osm.pbf
  # ──────────────────────────────────────────────────────────────────────────────
  gisgraphy-importer:
    image: alpine:latest
    profiles:
      - import
    command: >
      sh -c "
        apk add --no-cache curl wget &&
        echo '=== Downloading Europe OSM PBF from Geofabrik ===' &&
        wget -q --show-progress -O /osm-data/europe-latest.osm.pbf https://download.geofabrik.de/europe-latest.osm.pbf &&
        echo '=== Download complete – triggering Gisgraphy import ===' &&
        curl -sf 'http://gisgraphy:8080/api/import?type=osm' &&
        echo '=== Import started. Monitor progress at http://localhost:8080/public/admin.html ==='
      "
    volumes:
      - gisgraphy-osm-data:/osm-data
    depends_on:
      gisgraphy:
        condition: service_healthy
    restart: "no"

  geocoding-service:
    build:
      context: .
      dockerfile: src/LuminaVault.GeocodingService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Services__Gisgraphy: http://gisgraphy:8080
      Nats__Url: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
      gisgraphy:
        condition: service_started

  metadata-storage:
    build:
      context: .
      dockerfile: src/LuminaVault.MetadataStorage/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__luminavault-metadata: "Host=postgres;Database=luminavault-metadata;Username=luminavault;Password=luminavault"
    depends_on:
      postgres:
        condition: service_healthy

  vector-search:
    build:
      context: .
      dockerfile: src/LuminaVault.VectorSearch/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__luminavault-vectors: "Host=postgres;Database=luminavault-vectors;Username=luminavault;Password=luminavault"
    depends_on:
      postgres:
        condition: service_healthy

  thumbnail-generation:
    build:
      context: .
      dockerfile: src/LuminaVault.ThumbnailGeneration/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Minio__Endpoint: minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Nats__Url: nats://nats:4222
    depends_on:
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy

  object-recognition:
    build:
      context: .
      dockerfile: src/LuminaVault.ObjectRecognition/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Minio__Endpoint: minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Services__Ollama: http://ollama:11434
      Services__FaceRecognition: http://face-recognition:8080
      Services__MetadataStorage: http://metadata-storage:8080
      Nats__Url: nats://nats:4222
    depends_on:
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
      face-recognition:
        condition: service_started
      metadata-storage:
        condition: service_started
      nats:
        condition: service_healthy

  face-recognition:
    build:
      context: .
      dockerfile: src/LuminaVault.FaceRecognition/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Minio__Endpoint: minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Services__Ollama: http://ollama:11434
      Services__MetadataStorage: http://metadata-storage:8080
    depends_on:
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
      metadata-storage:
        condition: service_started

  media-import:
    build:
      context: .
      dockerfile: src/LuminaVault.MediaImport/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__luminavault-metadata: "Host=postgres;Database=luminavault-metadata;Username=luminavault;Password=luminavault"
      Minio__Endpoint: minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Services__ThumbnailGeneration: http://thumbnail-generation:8080
      Services__ObjectRecognition: http://object-recognition:8080
      Services__MetadataStorage: http://metadata-storage:8080
      Nats__Url: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      metadata-storage:
        condition: service_started
      nats:
        condition: service_healthy
      geocoding-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: src/LuminaVault.ApiGateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - media-import
      - metadata-storage
      - vector-search
      - thumbnail-generation
      - object-recognition
      - face-recognition

  webui:
    build:
      context: .
      dockerfile: src/LuminaVault.WebUI/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Services__ApiGateway: http://api-gateway:8080
      Nats__Url: nats://nats:4222
      # Container-internal path that maps to HOST_MEDIA_PATH on the host.
      # Change HOST_MEDIA_PATH in your .env file or shell environment to point
      # to the directory on the host machine you want to import from.
      Import__HostMediaPath: /media/import
    volumes:
      - webui-keys:/root/.aspnet/DataProtection-Keys
      # Bind-mount a host directory into the container so that the batch import
      # feature can read local media files.  Set HOST_MEDIA_PATH to the absolute
      # path of the directory on the Docker host, e.g.:
      #   HOST_MEDIA_PATH=/mnt/nas/photos docker compose up
      # The default falls back to a local ./media sub-directory.
      - ${HOST_MEDIA_PATH:-./media}:/media/import:ro
    depends_on:
      api-gateway:
        condition: service_started
      nats:
        condition: service_healthy
    ports:
      - "5001:8080"

volumes:
  postgres-data:
  minio-data:
  ollama-data:
  gisgraphy-data:
  gisgraphy-osm-data:
  webui-keys:
